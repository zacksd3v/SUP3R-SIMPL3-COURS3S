<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 11t</title>
</head>
<body>
    <script>
      function removeEgg(foods) {
        const reverseEgg = foods.reverse();

        const result = [];
        let eggsRemoved = 0;

        for (let i = 0; i < reverseEgg.length; i++) {
          // Only skip 'egg' if we removed less than 2
          // of them so far.
          if (reverseEgg[i] === 'egg' && eggsRemoved < 2) {
            // Update the number of 'egg' we have removed.
            // This must be done before continue, otherwise,
            // doing continue first will just skip this code.
            eggsRemoved++;
            continue;
          }

          result.push(reverseEgg[i]);
        }

        return result;
      }

      console.log(removeEgg(['egg', 'apple', 'egg', 'egg', 'ham']));
    </script>
</body>
</html>
