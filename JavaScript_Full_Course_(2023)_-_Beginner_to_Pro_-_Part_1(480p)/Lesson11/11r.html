<body>
    <script>
        function removeEgg(foods) {
           const items = [];
            for (let i = 0; i < foods.length; i++) {
                const item = foods[i];
                if (item === 'egg') {
                    continue;
                }
                items.push(foods[i]);
            }

            return items;
        }

        console.log(removeEgg(['egg', 'apple', 'egg', 'egg', 'ham']));
    </script>
</body>
