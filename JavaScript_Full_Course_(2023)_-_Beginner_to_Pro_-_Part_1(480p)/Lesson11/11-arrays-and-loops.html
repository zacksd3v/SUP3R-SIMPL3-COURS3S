<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arrays and Loops</title>
</head>
<body>
    <script>
        const myArray = [10, 20, 30, 40];
            console.log(myArray);
            console.log(myArray[1]);

            myArray[0] = 99;
            console.log(myArray);

            [1, 'Allah', false, { item: 'Copper' }, [99, 24]]; // Duk Array zai iya dauka

            // how to check the type
            console.log(typeof [9, 'Muhammad']); // this is not for an array

            //Best method to check for Array
            console.log(Array.isArray(myArray));

            console.log(myArray.length);

            myArray.push(1000); // add a value to the end

            console.log(myArray);

            myArray.splice(0, 1); // arg1: index, arg2: number of value

            console.log(myArray);

            console.log('[+] LOOPS')
            console.log('[+] While Loop')

            // Loops
            // While loop:
            let z = 2; // yana fara lissafi ne daga number da ka sanya masa

            while (z <= 10) {
                console.log(z);
                z++;
            }

            console.log('[+] For Loop')

            // For Loop: mini version of while loop ne. sbd muna hade komai a wuri 1 ne.
            for (let i = 1; i <= 5; i = i + 1) { // i++, i += 1 duk the same
                console.log(i)
            }

            // Wanne zamuyi aiki da shi ne?
            // In standard loop --> For Loop shine Best
            // In Non - Standard loop --> While shine Best

            // e.g
            let randomNumber = 0;

            while (randomNumber < 0.4) {
                randomNumber = Math.random();
            }

            console.log(randomNumber);

            // Looping Through an ARRay
            const todoList = [
                'Goto KYMETRA',
                'Code @ 12:00pm',
                'Recitetion',
                'Pray'
            ]
            // Method na farko
            for (let index = 0; index <= todoList.length - 1; index++) { // Amfanin qara -1 shine saboda mu samu exact number of values | items in an array. idan ba haka ba zai qara mana value 1 a index din.
                const values = todoList[index];
                console.log(values);
            }
            console.log('[+] Second Method')
            // Second Method Shortcut!
            for (let i = 0; i < todoList.length; i++) { // mun rage -1
                const value = todoList[i];
                console.log(value);
            }

            // Accumulator pattern (yadda ake calculation da loop a array)
            console.log('[+] Accumulator Patterns');
            const nums = [1, 1, 8];
            let total = 0; // Muna kiransa Accumulator variable

            for (let i = 0; i < nums.length; i++) {
                const num = nums[i];
                total += num;
            }

            console.log(total);

            // another e.g idan mutum yana son copy na array na shi snn yayi calculation along the way.
            const numDouble = []; // wann yanxu shine Accumulator var namu

            for (let i = 0; i < nums.length; i++) {
                const num = nums[i];
                numDouble.push(num * 3);
            }

            console.log(numDouble);

            // MORE DETAILS ABOUT ARRAY
            const array1 = [1, 2, 3];
            // const array2 = array1; // to solve this issue we gonna use .slice();
            const array2 = array1.slice();  // wnn zai mana copy na values din instead of refrence.
            array2.push(4);

            console.log(array1);
            console.log(array2);

            // DESTRUCTING TECHNIQUES IN ARRAY
            const array = [1, 2, 3];
            // if wanna get the first & second values i will have to do this:
            firstValue = array[0];
            secondValue = array[1];

            console.log('First Method');
            console.log(firstValue);
            console.log(secondValue);

            // TO AKWAE SHORTCUT!!!!!!!!!!!!!!
            const arraySortCut = [1, 2, 3]; /* is equal to =====> */ const [_1stValue, _2ndValue] = [1, 2, 3];
            console.log('Second Method');
            console.log(_1stValue);
            console.log(_2ndValue);

            //EXIT & SKIPPING ITERATION A.K.A BREAK & CONTINUE LOOPIN
            console.log('Break & Conitnues loop HERE! magic right!?');
            for (let i = 0; i <= 10; i++) {
                if (i === 2) {
                    continue;
                }

                if (i === 9) {
                    break
                }

                console.log(i);
            }
            
            console.log('MINI PROJECT TO CHECK IF A REMINDER IS DEVISIBLE BY 3');
            for (let i = 0; i <= 10; i++) {
                if (i % 3 ==  0) {
                    continue;
                }

                if (i === 9) {
                    break
                }

                console.log(i);
            }

            // USING WHILE LOOP FOR THIS PROJECT. NB i++ will be done manually in every scope!!!
            console.log('Using while Loop to create this Project!');
            let i = 0;

            while (i <= 10) {
                //Here's the Fun part!
                if (i % 3 === 0) {
                    i++;
                    continue;
                }
                console.log(i);
                i++;
            }

            // Loops with function
        console.log('LOOPIN WIT FNX');
        function loopinArray(items) {
            // const items = [1, 2, 3];
            const times2 = [];

            for (let i = 0; i < items.length; i++) {
                const num = items[i]; 
                if (num === 0) {
                    // break // yana dai-dai da return
                    return times2;
                }
                times2.push(num * 2);
            }

            return times2; // wnn yana hana function dina calling?
        }   

        console.log(loopinArray([1, 2, 3]));
        console.log(loopinArray([1, 2, 3, 5, 0, 5]));
    </script>
