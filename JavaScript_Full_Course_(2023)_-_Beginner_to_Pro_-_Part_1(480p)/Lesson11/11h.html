<body>
    <script>
        const emptyArrayToCopy = [];

        function addOne(array){
            for (let i = 0; i < array.length; i++) {
                const copy = array[i];
                emptyArrayToCopy.push(copy + 1);
            }

            console.log(emptyArrayToCopy);
        }

        addOne([1, 2, 3]);
        addOne([-2, -1, 0, 99]);
    </script>
</body>
