        const removeEgg = (foods) => {
            let eggToRemove = false;

            return foods.filter((value) => {
                if (value === 'egg' && !eggToRemove) {
                    eggToRemove = true; // wnn zai bani first egg.
                    return false // sai mu tsaida komai
                }
                return true;
            });
        };

        console.log(removeEgg(['egg', 'apple', 'egg', 'egg', 'ham']));
