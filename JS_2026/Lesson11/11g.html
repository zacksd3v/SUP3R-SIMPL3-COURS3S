<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 11g</title>
</head>
<body>
    <script>
        const box1 = [1, 2, 3];
        let box2 = [];

        for (let i = 0; i < box1.length; i++) {
            const copy = box1[i];
            box2.push(copy + 1);
            
        }

        console.log('First Array:')
        console.log(box1);
        console.log('Copied Array:')
        console.log(box2);
        
    </script>
</body>
</html>
