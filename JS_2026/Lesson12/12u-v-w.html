<!DOCTYPE html>
<html>
  <head>
    <!-- Exercise 12u-v-w -->
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style/12u-v-w-x.css">
  </head>
  <body>
    <p class="title">Rock Paper Scissors</p>
    <button class="move-button js-rock-button">
      <img src="../Lesson10/images/rock-emoji.png" class="move-icon">
    </button>

    <button class="move-button js-paper-button">
      <img src="../Lesson10/images/paper-emoji.png" class="move-icon">
    </button>

    <button class="move-button js-scissors-button">
      <img src="../Lesson10/images/scissors-emoji.png" class="move-icon">
    </button>

    <p class="js-result result"></p>
    <p class="js-moves"></p>
    <p class="js-score score"></p>

    <button class="reset-score-button js-reset-score-button btn-reset">Reset Score</button>

    <button class="auto-play-button btn-auto-event">Auto Play</button>
    
    <div class="js-confirm-message">
        
    </div>

    <script src="script/12u-v-w.js"></script>
  </body>
</html>
