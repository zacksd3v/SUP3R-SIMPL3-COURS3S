<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 4d</title>
    <style>
        body {
            font-family: Arial;
        }

        .login-input {
        padding: 10px 15px;
        margin-bottom: 10px;
        border-radius: 5px;
        border-width: 1px;
        width: 200px;
      }

       .login-button {
        background-color: rgb(0, 123, 255);
        color: white;
        margin-right: 5px;
        padding: 10px 15px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        margin-top: 10px;
      }

      .show-psswd {
        margin-left: 10px;
      }
    </style>
</head>
<body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev@8.6.4/react.js"></script>
    <script src="https://unpkg.com/supersimpledev@8.6.4/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev@8.6.4/babel.js"></script>
    <script type="text/babel">
        function App() {
            return (
                <>
                    <p>Assalam, Welcome to my Web</p>
                    <LoginForm />
                </>
            );
        }

        function LoginForm() {
            const [showPswd, setShowPswd] = React.useState(true);

            function toggle() {
                setShowPswd(!showPswd)
            }
            
            return (
                <>
                    <div>
                        <input
                            className="login-input" 
                            placeholder="Email" 
                            type="email" 
                        />
                    </div>
                    <div>
                        <input 
                            className="login-input"
                            placeholder="Password" 
                            type={showPswd ? 'password' : 'text'}  

                        />
                        <button 
                            className="show-psswd"
                            onClick={toggle}
                        >{showPswd ? 'Show' : 'Hide'}</button>
                    </div>
                    <div>
                        <button className="login-button">Login</button>
                        <button className="login-button">Sign up</button>    
                    </div>
                </>
            );
        }

        const container = document.querySelector('.js-container');
        ReactDOM.createRoot(container).render(<App />);
    </script>
</body>
</html>
