<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4i</title>
    <style>
        body {
            margin-top: 0;
            margin-bottom: 0;
        }

        .counter-button {
            background-color: rgb(25, 135, 84);
            color: white;
            padding: 10px 15px;
            border: none;
            margin-right: 10px;
            cursor: pointer;
        }

        .counter-container {
            display: flex;
            justify-content: center;
            height: 100vh;
            background-color: rgb(200, 200, 200);
            align-items: center;
        }
    </style>
</head>
<body>
     <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev@8.6.4/react.js"></script>
    <script src="https://unpkg.com/supersimpledev@8.6.4/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev@8.6.4/babel.js"></script>
    <script type="text/babel">
        function App() {
            const [count, setCount] = React.useState(0);
            const btnRef = React.useRef(); 
            
            function autoClick() {
                setInterval(() => {
                    const btnElem = btnRef.current;
                    if (btnElem) {
                        btnElem.click();
                    }
                }, 1000);
            }
            
            function increaseCount() {   
                setCount(count + 1);          
            }

            function reset() {
                setCount(0);
            }

            return (
                <>
                <div className="counter-container">
                    <button 
                        onClick={increaseCount} 
                        ref={btnRef}
                        className="counter-button"
                    >
                        Clicked {count} {count === 1 ? 'time' : 'times' }
                    </button>
                    <button onClick={reset} className="counter-button">
                        Reset    
                    </button>
                    <button onClick={autoClick} className="counter-button">
                        Auto Click     
                    </button>
                </div>
                </>
            );
        }
        const container = document.querySelector('.js-container');
        ReactDOM.createRoot(container).render(<App />);
    </script>
</body>
</html>
