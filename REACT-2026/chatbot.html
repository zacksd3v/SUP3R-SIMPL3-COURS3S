<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatBot</title>
</head>
<body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev@8.6.4/react.js"></script>
    <script src="https://unpkg.com/supersimpledev@8.6.4/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev@8.6.4/babel.js"></script>
    <script type="text/babel">
        function ChatInput() {
            return (
            <>
                <input placeholder="Send a message to chatb0t" size="30" />
                <button>Send</button>
            </>
            )
        }

        function ChatMessage() {
            return (
                <div>
                    Salamun Alaikum
                    <img src="user.png" width="50" />
                </div>
        )

        }
        const app = (
            <>
                <ChatInput />
                <ChatMessage />
            </>
        );
        const container = document.querySelector('.js-container');
        ReactDOM.createRoot(container).render(app);
    </script>
</body>
</html>
