        function ChatInput({ chatMessages, setChatMessages }) {
            const [inputText, setInputText] = React.useState('');
            const [isLoading, setIsLoading] = React.useState(false);

            function saveText(event) {
                // Duk lokacin da kayi running fnx a input, yana baka parameter guda 1 shine 'event'.
                setInputText(event.target.value); // Duk abinda nayi running zai min saving nasa ciki inputText var!.
            }
            // Ex 3k
            async function sendMessages() {
                if (isLoading || inputText === '') {
                    return;
                }

                setIsLoading(true);

                setInputText('');

                const newChatMessages = [
                    ...chatMessages,
                    {
                        message: inputText,
                        sender: 'user',
                        id: crypto.randomUUID()
                    }
                ]
                
                setChatMessages([
                    ...newChatMessages,
                    {
                        message: 'Loading...',
                        sender: 'robot',
                        id: crypto.randomUUID()
                    }
                ]);

                const response = await Chatbot.getResponseAsync(inputText);

                setChatMessages([
                    ...newChatMessages,
                    {
                        message: response,
                        sender: 'robot',
                        id: crypto.randomUUID()
                    }
                ]);

                setIsLoading(false);
            }
            // Ex 3i
            function enterKey(event) {
                if (event.key === 'Enter') {
                    sendMessages();
                }
                // Ex 3j
                if (event.key === 'Escape') {
                    setInputText('');
                }
            }

            return (
                // Domin ka iya style na wnn zuwa flex to dole ka maida fragment zuwa div.
            <div className="chat-input-container">
                {/* Let's Do some Code CleanUP */}
                {/* Ma'anar onChange: shine sadda kake rubutun a cikin input field din, aikin yake faruwa. Ma'ana fnx din yake runnig! */}
                {/* Muna kiran wnn controll input. value={} sbd muna d control akansa.. */}
                <input 
                    placeholder="Send a message to Zacks chatb0t" 
                    size="30" 
                    onChange={saveText}
                    value={inputText}
                    onKeyDown={enterKey}
                    className="chat-input"
                />
                <button
                    onClick={sendMessages}
                    className="send-button"
                >Send</button>
            </div>
            )
        }
