<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 2j</title>
</head>
<body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev@8.6.4/react.js"></script>
    <script src="https://unpkg.com/supersimpledev@8.6.4/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev@8.6.4/babel.js"></script>
    <script type="text/babel">
        function ProductDetails({ name, price, action, discountPrice, imageSrc }) {
            return (
                <> 
                    <div><img src={ imageSrc } width="100" /></div>
                    <p>{ name }</p>
                    {discountPrice ? (
                        <>
                            <p><del>Price: ${ price }</del></p>
                            <p>Discount Price: ${discountPrice}</p>
                        </>
                    ) : 
                (
                    <p>Price: ${price}</p>
                )}
                    
                    <button>{ action }</button>
                    <p></p>
                </>
            );
        }

        function App() {
            return (
                <>
                  <ProductDetails 
                    name="Cotton Socks" 
                    price="10.41" 
                    action="Add to Cart"
                    discountPrice="3.42"
                    imageSrc="../Images/cotton-socks.png"
                    />  
                    <ProductDetails 
                    name="Tennis balls" 
                    price="7.01" 
                    action="Add to Cart"
                    imageSrc="../Images/tennis-balls.png"
                    />  
                    <ProductDetails 
                    name="Plain T-Shirt" 
                    price="6.99" 
                    action="Add to Cart"
                    imageSrc="../Images/plain-t-shirt.png"
                   />  
                </>
            );
        }

        const container = document.querySelector('.js-container');
        ReactDOM.createRoot(container).render(<App />);
    </script>
</body>
</html>
