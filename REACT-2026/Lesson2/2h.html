<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 2h</title>
</head>
<body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev@8.6.4/react.js"></script>
    <script src="https://unpkg.com/supersimpledev@8.6.4/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev@8.6.4/babel.js"></script>
    <script type="text/babel">
        function ProductDetails({ name, price, action, discountPrice }) {
            // const { name, price, action } = props; duk 1 ne da na cikin parameter
            // console.log(props.discountPrice);
            return (
                <> 
                    <p>{ name }</p>
                    {!discountPrice && (
                        <p>Price: ${ price }</p>
                    )}
                    {discountPrice && (
                        <p><del>Price: ${ price }</del></p>
                    )}
                    {discountPrice && (
                        <p>Discount Price: ${discountPrice}</p>
                    )}
                    <button>{ action }</button>
                </>
            );
        }

        function App() {
            return (
                <>
                  <ProductDetails 
                    name="Cotton Socks" 
                    price="10.41" 
                    action="Add to Cart"
                    discountPrice="3.42"
                   />  
                  <ProductDetails 
                    name="Tennis balls" 
                    price="7.01" 
                    action="Add to Cart"
                   />  
                  <ProductDetails 
                    name="Plain T-Shirt" 
                    price="6.99" 
                    action="Add to Cart"
                   />  
                </>
            );
        }

        const container = document.querySelector('.js-container');
        ReactDOM.createRoot(container).render(<App />);
    </script>
</body>
</html>
