<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3f</title>
</head>
<body>
     <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev@8.6.4/react.js"></script>
    <script src="https://unpkg.com/supersimpledev@8.6.4/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev@8.6.4/babel.js"></script>
    <script type="text/babel">
        function CountApp({ count, setCount }) {
                        
            function increaseCount() {   
                setCount(count + 1);          
            }

            return (
                <>
                    <button onClick={increaseCount}>
                        Clicked {count} {count === 1 ? 'time' : 'times'}
                    </button>
                </>
            );
        }
        
        function App() {
            const [count, setCount] = React.useState(0);
            
            function resetCount() {
                setCount(0)
            }

            return (
                <>
                    <CountApp 
                        count={count} 
                        setCount={setCount}
                    />
                    <CountApp 
                        count={count} 
                        setCount={setCount}
                    />
                   <button onClick={resetCount}>
                        Reset
                   </button>
                </>
            );
        }
        const container = document.querySelector('.js-container');
        ReactDOM.createRoot(container).render(<App />);
    </script>
</body>
</html>
