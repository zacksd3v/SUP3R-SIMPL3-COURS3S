<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3h</title>
</head>
<body>
     <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev@8.6.4/react.js"></script>
    <script src="https://unpkg.com/supersimpledev@8.6.4/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev@8.6.4/babel.js"></script>
    <script type="text/babel">
        function Buttons({ setText, element }) {
            function reset() {
                setText('');
            }

            function alice() {
                setText('Alice');
            }

            return (
                <>
                    <button onClick={reset}>
                        {element}
                    </button>

                    <button onClick={alice}>
                        Example
                    </button>
                </>
            );
        }

        function App() {
            const [text, setText] = React.useState('');

            function typing(event) {
                setText(event.target.value);
            }
            
            return (
                <>
                    <input 
                        placeholder="Type a name here" 
                        onChange={typing}
                        value={text}
                    />
                    <Buttons 
                        setText={setText}
                        element="Reset"
                    />
                     <p>Assalamu Alaikum {text}</p>
                </>
            );
        }

        const container = document.querySelector('.js-container');
        ReactDOM.createRoot(container).render(<App />);
    </script>
</body>
</html>
